# Render.com blueprint — deploys all four services from this monorepo.
# Backends are private services (internal only); only the Next.js web app is public.
# Private services are reachable from each other at http://<name>:<port>.
services:
  # Task 1 — ML API (private)
  - type: pserv
    name: ml-api
    runtime: docker
    dockerfilePath: ./services/ml-api/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

  # App 1 backend — Python BFF (private)
  - type: pserv
    name: bff-property
    runtime: docker
    rootDir: services/bff-property
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: BFF_ML_API_URL
        value: http://ml-api:8000
      - key: BFF_CORS_ORIGINS
        value: '["https://hsbc-portal.onrender.com"]'

  # App 2 backend — Java Spring Boot (private)
  - type: pserv
    name: market-analysis
    runtime: docker
    rootDir: services/market-analysis
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: ML_API_URL
        value: http://ml-api:8000
      - key: CORS_ALLOWED_ORIGINS
        value: https://hsbc-portal.onrender.com

  # Next.js portal (public)
  - type: web
    name: hsbc-portal
    runtime: docker
    rootDir: web
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: BFF_URL
        value: http://bff-property:8000
      - key: MARKET_API_URL
        value: http://market-analysis:8080
