# Render.com blueprint — PRODUCTION deployment (branch: main).
#   Portal: https://hsbc-portal.onrender.com
#
# dev is intentionally NOT here — run it locally with `docker compose up`.
#
# Backends are private services (pserv, internal only); only the Next.js portal is public.
# Private services reach each other at http://<name>:<port>.
#
# See docs/DEPLOYMENT.md for the full setup runbook.
services:
  # Task 1 — ML API (PUBLIC web service so Swagger/OpenAPI is reachable at /docs).
  # Still reachable internally by the other backends at http://<internal-name>:8000.
  - type: web
    name: ml-api
    runtime: docker
    branch: main
    dockerfilePath: ./services/ml-api/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      # API-key enforcement. Secret value is set in the Render dashboard, never committed.
      - key: ML_API_KEY
        sync: false
      # Fail-closed: /predict and /model-info return 503 until ML_API_KEY is set.
      # ⚠ Set ML_API_KEY (here) + BFF_ML_API_KEY + market's ML_API_KEY BEFORE syncing this,
      # or the app will 503 until they are configured.
      - key: ML_API_REQUIRE_KEY
        value: "true"

  # App 1 backend — Python BFF (private)
  - type: pserv
    name: bff-property
    runtime: docker
    branch: main
    rootDir: services/bff-property
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      # Render assigned every service in this blueprint the shared "-ilhl" suffix.
      - key: BFF_ML_API_URL
        value: http://ml-api-ilhl:8000
      - key: BFF_CORS_ORIGINS
        value: '["https://hsbc-portal-ilhl.onrender.com"]'
      # Forwarded to the ML API as X-API-Key. Secret set in the dashboard.
      - key: BFF_ML_API_KEY
        sync: false

  # App 2 backend — Java Spring Boot (private)
  - type: pserv
    name: market-analysis
    runtime: docker
    branch: main
    rootDir: services/market-analysis
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: ML_API_URL
        value: http://ml-api-ilhl:8000
      - key: CORS_ALLOWED_ORIGINS
        value: https://hsbc-portal-ilhl.onrender.com
      # Forwarded to the ML API as X-API-Key. Secret set in the dashboard.
      - key: ML_API_KEY
        sync: false

  # Next.js portal (public)
  - type: web
    name: hsbc-portal
    runtime: docker
    branch: main
    rootDir: web
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: BFF_URL
        value: http://bff-property-ilhl:8000
      - key: MARKET_API_URL
        value: http://market-analysis-ilhl:8080
