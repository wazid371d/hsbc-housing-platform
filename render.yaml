# Render.com blueprint — PRODUCTION deployment (branch: main).
#   Portal: https://hsbc-portal.onrender.com
#
# dev is intentionally NOT here — run it locally with `docker compose up`.
#
# Backends are private services (pserv, internal only); only the Next.js portal is public.
# Private services reach each other at http://<name>:<port>.
#
# See docs/DEPLOYMENT.md for the full setup runbook.
services:
  # Task 1 — ML API (private)
  - type: pserv
    name: ml-api
    runtime: docker
    branch: main
    dockerfilePath: ./services/ml-api/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

  # App 1 backend — Python BFF (private)
  - type: pserv
    name: bff-property
    runtime: docker
    branch: main
    rootDir: services/bff-property
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: BFF_ML_API_URL
        value: http://ml-api:8000
      - key: BFF_CORS_ORIGINS
        value: '["https://hsbc-portal.onrender.com"]'

  # App 2 backend — Java Spring Boot (private)
  - type: pserv
    name: market-analysis
    runtime: docker
    branch: main
    rootDir: services/market-analysis
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: ML_API_URL
        value: http://ml-api:8000
      - key: CORS_ALLOWED_ORIGINS
        value: https://hsbc-portal.onrender.com

  # Next.js portal (public)
  - type: web
    name: hsbc-portal
    runtime: docker
    branch: main
    rootDir: web
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: BFF_URL
        value: http://bff-property:8000
      - key: MARKET_API_URL
        value: http://market-analysis:8080
