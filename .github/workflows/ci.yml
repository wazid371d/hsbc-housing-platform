name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml-api:
    name: ml-api (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ml-api/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest

  bff-property:
    name: bff-property (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bff-property
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/bff-property/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest

  market-analysis:
    name: market-analysis (mvn test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/market-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B test

  web:
    name: web (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
